name: Lint Test

on: [pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest # The runner environment

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # Action to check out your repository code

    - name: Set up Node.js
      uses: actions/setup-node@v4 # Action to set up the required language environment
      with:
        node-version: '20' # Specify your project's node version
        cache: 'npm' # Optional: Cache dependencies for faster runs

    - name: Install dependencies
      run: npm ci # Install project dependencies

    - name: Run ESLint
      run: npx eslint . --ext .js,.jsx,.ts,.tsx # The command to run your linter